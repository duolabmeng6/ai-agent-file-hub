services:
  agent-file-hub:
    image: duolabmeng/agent_file_hub:${AGENT_FILE_HUB_VERSION:-v1.0.3}
    container_name: agent_file_hub
    restart: unless-stopped
    group_add:
      - "${DATA_GROUP_ID:-1000}"
    environment:
      PORT: 9000
      GIN_MODE: release
      TZ: ${TZ:-Asia/Shanghai}
      FILE_BROWSER_ROOT: /app/storage
      FILE_BROWSER_AUTH_USERNAME: ${FILE_BROWSER_AUTH_USERNAME:-admin}
      FILE_BROWSER_AUTH_PASSWORD: ${FILE_BROWSER_AUTH_PASSWORD:-}
    ports:
      - "${HOST_PORT:-18787}:9000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
