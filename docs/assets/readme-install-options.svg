<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent File Hub 三种安装方式</title>
  <desc id="desc">展示 AI Agent 智能安装、Docker 服务器部署、客户端直接运行三种安装方式。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafdff"/>
      <stop offset="1" stop-color="#f2f4f8"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7df6"/>
      <stop offset="1" stop-color="#0071e3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1280" height="620" rx="34" fill="url(#bg)"/>
  <text x="70" y="88" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="42" font-weight="800">三种方式启动 AgentFileHub</text>
  <text x="70" y="126" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">面向不同用户路径：发给智能体、服务器 Docker、本机客户端。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="178" width="350" height="350" rx="18" fill="#ffffff" stroke="#cfe4ff"/>
    <rect x="102" y="214" width="110" height="34" rx="17" fill="#eaf4ff"/>
    <text x="126" y="237" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="800">最省事</text>
    <text x="102" y="300" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="31" font-weight="800">AI Agent 安装</text>
    <text x="102" y="338" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">复制一句话给 OpenClaw、Claude</text>
    <text x="102" y="365" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">或 Codex，让智能体完成安装验证。</text>
    <rect x="102" y="406" width="256" height="62" rx="12" fill="#f5f5f7"/>
    <text x="126" y="444" fill="#1d1d1f" font-family="SFMono-Regular,Menlo,monospace" font-size="17" font-weight="700">$agent-file-hub</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="465" y="178" width="350" height="350" rx="18" fill="#ffffff" stroke="#ccebd4"/>
    <rect x="497" y="214" width="120" height="34" rx="17" fill="#eaf8ee"/>
    <text x="520" y="237" fill="#248a3d" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="800">服务器推荐</text>
    <text x="497" y="300" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="31" font-weight="800">Docker 部署</text>
    <text x="497" y="338" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">一条命令生成 Compose 配置，</text>
    <text x="497" y="365" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">拉取镜像并后台运行。</text>
    <rect x="497" y="406" width="256" height="62" rx="12" fill="#1f1f21"/>
    <text x="522" y="444" fill="#f5f5f7" font-family="SFMono-Regular,Menlo,monospace" font-size="16" font-weight="700">curl ... install.sh</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="178" width="350" height="350" rx="18" fill="#ffffff" stroke="#f1dfc3"/>
    <rect x="892" y="214" width="118" height="34" rx="17" fill="#fff3df"/>
    <text x="916" y="237" fill="#bf6a02" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="800">本机体验</text>
    <text x="892" y="300" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="31" font-weight="800">客户端下载</text>
    <text x="892" y="338" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">Windows、macOS、Linux 按系统</text>
    <text x="892" y="365" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="17">下载二进制文件直接运行。</text>
    <g transform="translate(892 406)">
      <rect width="78" height="38" rx="10" fill="#f5f5f7"/>
      <rect x="90" width="78" height="38" rx="10" fill="#f5f5f7"/>
      <rect x="180" width="78" height="38" rx="10" fill="#f5f5f7"/>
      <text x="17" y="25" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">Win</text>
      <text x="106" y="25" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">Mac</text>
      <text x="193" y="25" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">Linux</text>
    </g>
  </g>

  <path d="M420 353h45" stroke="url(#blue)" stroke-width="6" stroke-linecap="round"/>
  <path d="M815 353h45" stroke="url(#blue)" stroke-width="6" stroke-linecap="round"/>
</svg>
