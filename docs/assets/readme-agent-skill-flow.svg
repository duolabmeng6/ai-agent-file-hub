<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">AgentFileHub AI Agent 智能安装流程</title>
  <desc id="desc">展示用户把安装技能地址发给 AI Agent 后，智能体读取技能、检查环境、选择安装方式、启动服务并验证访问。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <text x="70" y="86" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="40" font-weight="800">一句话交给 AI Agent</text>
  <text x="70" y="124" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">用户只需要复制 Skill 地址，智能体负责安装、启动和验证。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="250" height="210" rx="18" fill="#ffffff" stroke="#d2d2d7"/>
    <circle cx="116" cy="240" r="23" fill="#eaf4ff"/>
    <text x="108" y="249" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">1</text>
    <text x="100" y="304" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800">复制一句话</text>
    <text x="100" y="340" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">请帮我安装 AgentFileHub</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="365" y="190" width="250" height="210" rx="18" fill="#ffffff" stroke="#d2d2d7"/>
    <circle cx="411" cy="240" r="23" fill="#eaf4ff"/>
    <text x="403" y="249" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">2</text>
    <text x="395" y="304" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800">读取 Skill</text>
    <text x="395" y="340" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">加载安装步骤和排障规则</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="190" width="250" height="210" rx="18" fill="#ffffff" stroke="#d2d2d7"/>
    <circle cx="706" cy="240" r="23" fill="#eaf4ff"/>
    <text x="698" y="249" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">3</text>
    <text x="690" y="304" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800">检查环境</text>
    <text x="690" y="340" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">Docker、端口、系统架构</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="955" y="190" width="255" height="210" rx="18" fill="#ffffff" stroke="#d2d2d7"/>
    <circle cx="1001" cy="240" r="23" fill="#eaf4ff"/>
    <text x="993" y="249" fill="#0071e3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800">4</text>
    <text x="985" y="304" fill="#1d1d1f" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800">启动验证</text>
    <text x="985" y="340" fill="#6e6e73" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16">打开 127.0.0.1:18787</text>
  </g>

  <path d="M320 296h45" stroke="#0071e3" stroke-width="5" stroke-linecap="round"/>
  <path d="M615 296h45" stroke="#0071e3" stroke-width="5" stroke-linecap="round"/>
  <path d="M910 296h45" stroke="#0071e3" stroke-width="5" stroke-linecap="round"/>
  <rect x="258" y="452" width="764" height="48" rx="24" fill="#1f1f21"/>
  <text x="315" y="483" fill="#f5f5f7" font-family="SFMono-Regular,Menlo,monospace" font-size="16">Skill URL: https://my.rongyiapi.com/.../agent-file-hub/SKILL.md</text>
</svg>
