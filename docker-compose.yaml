services:
  agent-file-hub:
    image: duolabmeng/agent_file_hub:${AGENT_FILE_HUB_VERSION:-v1.0.0}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${AGENT_FILE_HUB_VERSION:-v1.0.0}
    container_name: agent_file_hub
    restart: unless-stopped
    environment:
      PORT: 9000
      GIN_MODE: release
      TZ: ${TZ:-Asia/Shanghai}
      FILE_BROWSER_ROOT: /app/storage
      FILE_BROWSER_AUTH_USERNAME: ${FILE_BROWSER_AUTH_USERNAME:-admin}
      FILE_BROWSER_AUTH_PASSWORD: ${FILE_BROWSER_AUTH_PASSWORD:-}
    ports:
      - "${HOST_PORT:-9000}:9000"
    volumes:
      - agent_file_hub_data:/app/data
      - agent_file_hub_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  agent_file_hub_data:
  agent_file_hub_storage:
